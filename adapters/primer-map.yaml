# GitSkin token → Primer CSS variable mapping
#
# Each key is a GitSkin token path (dot-separated).
# Each value is the Primer CSS custom property it maps to.
#
# Theme authors reference the left side in .skin files.
# The extension emits the right side as CSS variable overrides.
#
# Source: extracted from live GitHub DOM (2026-04-10)
# Total: 900 Primer CSS variables, mapped to ~330 curated GitSkin tokens
# plus passthrough support for all raw Primer names.

