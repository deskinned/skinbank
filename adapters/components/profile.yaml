# User profile page components
# Covers: user profile overview page
page: profile
components:
  ProfileCard:
    description: User vcard container with avatar, name, username, bio, details
    strategies:
      - type: classname
        selector: '.h-card'
        confidence: 0.6
    sanity:
      tag: DIV

  ProfileAvatar:
    description: User profile avatar image
    strategies:
      - type: classname
        selector: 'img.avatar-user'
        confidence: 0.55
    sanity:
      tag: IMG

  ProfileName:
    description: User display name (full name)
    strategies:
      - type: classname
        selector: 'span.p-name.vcard-fullname'
        confidence: 0.6
    sanity:
      tag: SPAN

  ProfileUsername:
    description: User login handle
    strategies:
      - type: classname
        selector: 'span.p-nickname.vcard-username'
        confidence: 0.6
    sanity:
      tag: SPAN

  ProfileBio:
    description: User bio text
    strategies:
      - type: classname
        selector: 'div.p-note.user-profile-bio'
        confidence: 0.6
    sanity:
      tag: DIV

  ProfileNav:
    description: Profile tab navigation (Overview, Repositories, Projects, Packages, Stars)
    strategies:
      - type: aria
        selector: 'nav[aria-label="User"]'
        confidence: 0.85
    sanity:
      tag: NAV

  ContributionGraph:
    description: Green contribution heatmap calendar
    strategies:
      - type: classname
        selector: '.js-calendar-graph'
        confidence: 0.55
    sanity:
      tag: DIV

  PinnedRepos:
    description: Pinned repositories list items (up to 6)
    strategies:
      - type: classname
        selector: '.pinned-item-list-item'
        confidence: 0.55
    sanity:
      tag: LI

  ProfileSidebarDetails:
    description: Sidebar details (location, organization, links) using vcard microformat
    strategies:
      - type: classname
        selector: 'li.vcard-detail'
        confidence: 0.55
