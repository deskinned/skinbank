# Global components — present on every GitHub page
page: global
components:
  AppHeader:
    description: Top navigation bar (logo, search, notifications, user menu)
    strategies:
      - type: aria
        selector: 'header[role="banner"][aria-label="Global Navigation Menu"]'
        confidence: 0.95
    sanity:
      tag: HEADER

  AppHeaderLeft:
    description: Left section of global header (logo, hamburger menu)
    strategies:
      - type: data-attr
        selector: '[data-testid="top-nav-left"]'
        confidence: 0.9
    sanity:
      tag: DIV

  AppHeaderCenter:
    description: Center section of global header (search bar)
    strategies:
      - type: data-attr
        selector: '[data-testid="top-nav-center"]'
        confidence: 0.9
    sanity:
      tag: DIV

  AppHeaderRight:
    description: Right section of global header (create button, notifications, user avatar)
    strategies:
      - type: data-attr
        selector: '[data-testid="top-nav-right"]'
        confidence: 0.9
    sanity:
      tag: DIV

  UserAvatar:
    description: Logged-in user avatar image in header
    strategies:
      - type: data-attr
        selector: 'img[data-testid="github-avatar"]'
        confidence: 0.9
    sanity:
      tag: IMG

  Footer:
    description: Page footer with links and copyright
    strategies:
      - type: aria
        selector: 'footer[role="contentinfo"]'
        confidence: 0.95
    sanity:
      tag: FOOTER
